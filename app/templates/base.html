<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CookHelper</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="top-accent-bar"></div>
  {% if current_user %}
  <div class="top-bar">
    <div class="top-bar-brand">🍽️ CookHelper</div>
    <div class="avatar avatar-sm">{{ current_user.username[0]|upper }}</div>
  </div>
  <nav class="tab-pills">
    <a class="tab-pill {{ 'active' if request.url.path == '/' else '' }}" href="/">Today</a>
    <a class="tab-pill {{ 'active' if request.url.path == '/week' else '' }}" href="/week">This week</a>
    <a class="tab-pill {{ 'active' if request.url.path == '/profile' else '' }}" href="/profile">Family</a>
    <a class="tab-pill {{ 'active' if request.url.path == '/preferences' else '' }}" href="/preferences">Preferences</a>
    <a class="tab-pill {{ 'active' if request.url.path == '/dishes' else '' }}" href="/dishes">Dishes</a>
    <a class="tab-pill {{ 'active' if request.url.path == '/pantry' else '' }}" href="/pantry">Pantry</a>
  </nav>
  <div class="account-row">
    <span class="nav-user">{{ current_user.username }}</span>
    <form method="post" action="/logout" class="nav-logout"><button class="secondary" type="submit">Log out</button></form>
  </div>
  {% else %}
  <nav>
    <a href="/login">Log in</a>
    <a href="/signup">Sign up</a>
  </nav>
  {% endif %}
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
