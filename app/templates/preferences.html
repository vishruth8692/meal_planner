{% extends "base.html" %}
{% block content %}
<h1>Household Preferences</h1>
{% if is_onboarding %}
<p class="hint">Step 2 of 3. This shapes every suggestion the app makes — you can change it later too.</p>
{% endif %}

<div class="card">
  <form method="post" action="/preferences">
    <label>
      Diet
      <select name="household_diet">
        <option value="veg" {% if settings.household_diet.value == "veg" %}selected{% endif %}>Vegetarian</option>
        <option value="egg" {% if settings.household_diet.value == "egg" %}selected{% endif %}>Eggetarian</option>
        <option value="non_veg" {% if settings.household_diet.value == "non_veg" %}selected{% endif %}>Non-vegetarian</option>
      </select>
    </label>
    <label>
      Cuisine preference
      <select name="cuisine_preference">
        <option value="universal" {% if settings.cuisine_preference.value == "universal" %}selected{% endif %}>Both / no preference</option>
        <option value="north" {% if settings.cuisine_preference.value == "north" %}selected{% endif %}>North Indian</option>
        <option value="south" {% if settings.cuisine_preference.value == "south" %}selected{% endif %}>South Indian</option>
      </select>
    </label>
    <label>
      Don't repeat a dish within (days)
      <input type="number" name="repeat_gap_days" value="{{ settings.repeat_gap_days }}" min="0" />
    </label>
    <button type="submit">{{ "Continue" if is_onboarding else "Save preferences" }}</button>
  </form>
</div>
{% if not is_onboarding %}
<p class="hint"><a href="/profile">&larr; Back to Family</a></p>
{% endif %}
{% endblock %}
