{% extends "base.html" %}
{% block content %}
<h1>Create your account</h1>
<p class="hint">Each account gets its own family profile, dish catalog, and pantry — nothing is shared with other users.</p>

{% if error %}<div class="card error-card">{{ error }}</div>{% endif %}

<div class="card">
  <form method="post" action="/signup">
    <label>Username <input type="text" name="username" required autofocus minlength="3" /></label>
    <label>Password <input type="password" name="password" required minlength="6" /></label>
    <button type="submit">Sign up</button>
  </form>
</div>
<p class="hint">Already have an account? <a href="/login">Log in</a></p>
{% endblock %}
